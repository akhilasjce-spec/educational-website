<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Study Point</title>

<style>
body{
    font-family:Arial;
    background:#111827;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.box{
    background:white;
    padding:30px;
    width:320px;
    border-radius:12px;
    box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#2563eb;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.msg{
    text-align:center;
    color:red;
    margin-top:10px;
}

.small{
    text-align:center;
    margin-top:10px;
    font-size:13px;
    color:#666;
}
</style>
</head>

<body>

<div class="box">

    <h2>Study Point Login</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>

    <p class="msg" id="msg"></p>

    <p class="small">
        Demo: admin / 1234
    </p>

</div>

<script>

function login(){

    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;

    if(u === "" || p === ""){
        document.getElementById("msg").innerText = "Fill all fields";
        return;
    }

    if(u === "admin" && p === "1234"){

        localStorage.setItem("loggedIn", "true");
        localStorage.setItem("user", u);

        window.location.href = "index.html";

    } else {
        document.getElementById("msg").innerText = "Invalid login";
    }
}

</script>

</body>
</html>
